services:
  postgres:
    container_name: postgres
    image: postgres:16-alpine
    restart: unless-stopped
    # без внешних портов — доступ только из внутренней сети Docker
    environment:
      # задайте POSTGRES_PASSWORD в .env перед запуском
      POSTGRES_USER: ${POSTGRES_USER:-wikilive}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-wikilive_dev_password_123}
      POSTGRES_DB: ${POSTGRES_DB:-wikilive}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U wikilive']
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    container_name: backend
    build: ./backend
    restart: unless-stopped
    ports:
      - '3001:3001'
      - '3002:3002'
    environment:
      # COOKIE_SECRET и POSTGRES_PASSWORD должны быть заданы в .env
      DATABASE_URL: postgresql://${POSTGRES_USER:-wikilive}:${POSTGRES_PASSWORD}@postgres:5432/wikilive
      MWS_TABLES_BASE_URL: ${MWS_TABLES_BASE_URL:-https://tables.mws.ru}
      MWS_TABLES_TOKEN: ${MWS_TABLES_TOKEN:-}
      MWS_TABLES_SPACE_ID: ${MWS_TABLES_SPACE_ID:-}
      MWS_GPT_API_URL: ${MWS_GPT_API_URL:-https://api.gpt.mws.ru/v1/chat/completions}
      MWS_GPT_API_KEY: ${MWS_GPT_API_KEY:-}
      PORT: 3001
      WS_PORT: 3002
      ALLOWED_ORIGIN: ${ALLOWED_ORIGIN:-http://localhost:3000}
      COOKIE_SECRET: ${COOKIE_SECRET:-dev_cookie_secret_change_in_production_12345}
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    container_name: frontend
    build: ./frontend
    restart: unless-stopped
    ports:
      - '3000:8080'
    depends_on:
      - backend

volumes:
  pgdata:
